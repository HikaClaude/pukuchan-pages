<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ぷくちゃん</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Rounded Mplus 1c", sans-serif;
    background: linear-gradient(135deg, #ffd3e0, #c9f0ff, #fff6b7, #d5ffd5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.85);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
  }
  h1 {
    margin-top: 0;
    color: #444;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 24px;
  }
  a.button {
    display: block;
    padding: 16px 32px;
    border-radius: 999px;
    background: #ff8fab;
    color: white;
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  a.button.sleep {
    background: #6c8cff;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>ぷくちゃん</h1>
    <div class="links">
      <a class="button" href="pukuchan_dance.html">ぷくちゃんと おどろう！</a>
      <a class="button sleep" href="pukuchan_sleep.html">ぷくちゃん ねんねしようね</a>

  </div>

</html>
