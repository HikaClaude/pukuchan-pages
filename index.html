<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ぷくちゃん</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    min-height: 100dvh;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Rounded Mplus 1c", sans-serif;
    background: linear-gradient(135deg, #ffd3e0, #c9f0ff, #fff6b7, #d5ffd5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.85);
    border-radius: 24px;
    padding: 6vw 6vw calc(6vw + env(safe-area-inset-bottom)) 6vw;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
    width: 100%;
    max-width: 480px;
    margin: 4vh 4vw;
  }
  h1 {
    margin-top: 0;
    color: #444;
    font-size: clamp(24px, 7vw, 34px);
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 24px;
  }
  a.button {
    display: block;
    padding: 18px 24px;
    border-radius: 999px;
    background: #ff8fab;
    color: white;
    text-decoration: none;
    font-size: clamp(16px, 4.6vw, 20px);
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  a.button.sleep { background: #6c8cff; }
  a.button.food { background: #ff9f45; }
  a.button.bath { background: #4fb4ef; }
  a.button.draw { background: #ffd93d; color: #555; }
  a.button.clean { background: #7c6cff; }
  a.button.exercise { background: #4fcf9e; }
</style>
</head>
<body>
  <div class="card">
    <h1>ぷくちゃん</h1>
    <div class="links">
      <a class="button" href="pukuchan_dance.html">ぷくちゃんと おどろう！</a>
      <a class="button sleep" href="pukuchan_sleep.html">ぷくちゃん ねんねしようね</a>
      <a class="button food" href="pukuchan_food.html">ぷくちゃんの ごはん</a>
      <a class="button bath" href="pukuchan_bath.html">ぷくちゃんの おふろ</a>
      <a class="button draw" href="pukuchan_draw.html">ぷくちゃんと おえかき</a>
      <a class="button clean" href="pukuchan_clean.html">ぷくちゃんの おそうじ</a>
      <a class="button exercise" href="pukuchan_exercise.html">ぷくちゃんの たいそう</a>
    </div>
  </div>
</body>
</html>
