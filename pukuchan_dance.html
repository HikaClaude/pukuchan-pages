<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ぷくちゃんと おどろう！</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Rounded Mplus 1c", sans-serif;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: linear-gradient(135deg, #ffd3e0, #c9f0ff, #fff6b7, #d5ffd5);
    background-size: 400% 400%;
    background-position: 0% 50%;
  }
  #app.music-on {
    animation: bgShift 6s ease-in-out infinite, huePulse 4s linear infinite;
  }
  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes huePulse {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
  }

  #characterArea {
    position: relative;
    flex: 1;
  }

  .ground-shadow {
    position: absolute;
    bottom: 17%;
    left: 50%;
    transform: translateX(-50%);
    width: 42vw;
    max-width: 230px;
    height: 5vh;
    max-height: 26px;
    background: radial-gradient(ellipse at center, rgba(20, 40, 30, 0.3), rgba(20, 40, 30, 0));
    border-radius: 50%;
    z-index: 1;
  }

  #pukuReactWrap {
    position: absolute;
    left: 50%;
    bottom: 13%;
    transform: translateX(-50%);
    width: min(70vw, 56vh);
    aspect-ratio: 300 / 320;
    z-index: 2;
  }
  #pukuDanceWrap {
    width: 100%;
    height: 100%;
  }
  #pukuSvg { width: 100%; height: 100%; display: block; }

  #pukuDanceWrap.dancing {
    animation: dance 0.6s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes dance {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-6%) rotate(3deg); }
  }

  #pukuDanceWrap.dancing #armLeft {
    transform-box: fill-box;
    transform-origin: 50% 0%;
    animation: armSwingL 0.6s ease-in-out infinite;
  }
  #pukuDanceWrap.dancing #armRight {
    transform-box: fill-box;
    transform-origin: 50% 0%;
    animation: armSwingR 0.6s ease-in-out infinite;
  }
  @keyframes armSwingL {
    0%, 100% { transform: rotate(-16deg); }
    50%      { transform: rotate(16deg); }
  }
  @keyframes armSwingR {
    0%, 100% { transform: rotate(16deg); }
    50%      { transform: rotate(-16deg); }
  }
  #pukuDanceWrap.dancing #pukuHead {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: headTilt 0.6s ease-in-out infinite;
  }
  @keyframes headTilt {
    0%, 100% { transform: rotate(-4deg); }
    50%      { transform: rotate(4deg); }
  }

  #pukuReactWrap.react-jump { animation: reactJump 0.6s ease; }
  @keyframes reactJump {
    0%   { transform: translateX(-50%) translateY(0) scale(1, 1); }
    30%  { transform: translateX(-50%) translateY(0) scale(1.15, 0.8); }
    55%  { transform: translateX(-50%) translateY(-32%) scale(0.85, 1.15); }
    80%  { transform: translateX(-50%) translateY(0) scale(1.1, 0.85); }
    100% { transform: translateX(-50%) translateY(0) scale(1, 1); }
  }
  #pukuReactWrap.react-spin { animation: reactSpin 0.7s ease; }
  @keyframes reactSpin {
    from { transform: translateX(-50%) rotate(0deg); }
    to   { transform: translateX(-50%) rotate(360deg); }
  }

  .effect {
    position: absolute;
    transform: translate(-50%, -50%);
    font-size: 9vw;
    pointer-events: none;
    animation: effectPop 0.9s ease-out forwards;
    z-index: 4;
  }
  @keyframes effectPop {
    0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
    60%  { transform: translate(-50%, -80%) scale(1.3); opacity: 1; }
    100% { transform: translate(-50%, -160%) scale(0.9); opacity: 0; }
  }

  .bubble {
    position: absolute;
    top: 6%;
    left: 50%;
    transform: translate(-50%, 10px) scale(0.85);
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    background: #ffffff;
    border-radius: 24px;
    padding: 1.6vh 5vw;
    font-size: clamp(18px, 5.2vw, 30px);
    font-weight: 800;
    color: #555;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
    max-width: 82%;
    text-align: center;
    pointer-events: none;
    z-index: 6;
  }
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 13px 11px 0 11px;
    border-style: solid;
    border-color: #ffffff transparent transparent transparent;
  }
  .bubble.show {
    opacity: 1;
    transform: translate(-50%, 0) scale(1);
  }

  #controls {
    flex: 0 0 auto;
    padding: 2.5vh 5vw calc(2.5vh + env(safe-area-inset-bottom)) 5vw;
  }

  #musicBtn {
    width: 100%;
    height: 16vh;
    min-height: 92px;
    max-height: 150px;
    border: none;
    border-radius: 40px;
    background: linear-gradient(160deg, #ff9fc0, #ff6f9e);
    color: #fff;
    font-size: clamp(20px, 6.2vw, 34px);
    font-weight: 900;
    box-shadow: 0 1.2vh 0 rgba(184, 60, 105, 0.5), 0 2vh 2vh rgba(0, 0, 0, 0.15);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    touch-action: manipulation;
  }
  #musicBtn:active {
    transform: translateY(0.8vh);
    box-shadow: 0 0.3vh 0 rgba(184, 60, 105, 0.5);
  }
  #musicBtn.playing {
    background: linear-gradient(160deg, #8fe3c0, #4fcf9e);
    box-shadow: 0 1.2vh 0 rgba(46, 133, 100, 0.5), 0 2vh 2vh rgba(0, 0, 0, 0.15);
  }
  #musicBtn.playing:active {
    box-shadow: 0 0.3vh 0 rgba(46, 133, 100, 0.5);
  }
</style>
</head>
<body>

  <div id="app">
    <div id="characterArea">
      <div class="ground-shadow"></div>

      <div id="pukuReactWrap">
        <div id="pukuDanceWrap">
          <svg id="pukuSvg" viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg">
            <!-- しっぽ -->
            <ellipse cx="212" cy="255" rx="24" ry="15" transform="rotate(30 212 255)" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="4"/>
            <polygon points="228,238 244,232 236,250" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>

            <!-- あし -->
            <ellipse cx="116" cy="298" rx="28" ry="18" fill="#5FCB93" stroke="#3C8F6C" stroke-width="4"/>
            <ellipse cx="184" cy="298" rx="28" ry="18" fill="#5FCB93" stroke="#3C8F6C" stroke-width="4"/>

            <!-- せなかのトゲトゲ -->
            <polygon points="196,205 210,190 214,212" fill="#5FCB93" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>
            <polygon points="205,230 220,218 221,238" fill="#5FCB93" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>

            <!-- からだ -->
            <ellipse cx="150" cy="220" rx="76" ry="68" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="5"/>
            <!-- おなか -->
            <ellipse cx="150" cy="240" rx="44" ry="36" fill="#FFF6DA"/>

            <!-- うで -->
            <ellipse id="armLeft" cx="78" cy="215" rx="20" ry="30" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="4"/>
            <ellipse id="armRight" cx="222" cy="215" rx="20" ry="30" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="4"/>

            <!-- あたま -->
            <g id="pukuHead">
              <circle cx="150" cy="105" r="70" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="5"/>

              <!-- あたまのトゲトゲ -->
              <polygon points="132,46 148,26 152,50" fill="#5FCB93" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>
              <polygon points="150,44 165,25 170,50" fill="#5FCB93" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>

              <!-- ほっぺ -->
              <ellipse cx="106" cy="132" rx="13" ry="8" fill="#FF9EB5" opacity="0.6"/>
              <ellipse cx="194" cy="132" rx="13" ry="8" fill="#FF9EB5" opacity="0.6"/>

              <!-- め -->
              <ellipse cx="126" cy="108" rx="19" ry="23" fill="#FFFFFF" stroke="#3C8F6C" stroke-width="2.5"/>
              <ellipse cx="174" cy="108" rx="19" ry="23" fill="#FFFFFF" stroke="#3C8F6C" stroke-width="2.5"/>
              <circle cx="130" cy="113" r="9" fill="#2B2B3A"/>
              <circle cx="170" cy="113" r="9" fill="#2B2B3A"/>
              <circle cx="135" cy="104" r="3.5" fill="#FFFFFF"/>
              <circle cx="175" cy="104" r="3.5" fill="#FFFFFF"/>

              <!-- くち -->
              <path d="M136,142 Q150,154 164,142" stroke="#2B2B3A" stroke-width="4" fill="none" stroke-linecap="round"/>
            </g>
          </svg>
        </div>
      </div>

      <div id="speechBubble" class="bubble"></div>
    </div>

    <div id="controls">
      <button id="musicBtn" type="button">🎵 おんがく ▶</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var PHRASES = ["たのしー！", "いえーい！", "わーい！", "ぷくぷく〜", "もっとおどろう！", "きゃはは！"];
  var EFFECT_EMOJI = ["⭐", "✨", "💖", "💗", "🌟", "💛"];
  var MELODY = [523.25, 587.33, 659.25, 783.99, 659.25, 587.33, 523.25, 392.00];
  var STEP_MS = 300;

  var app = document.getElementById("app");
  var characterArea = document.getElementById("characterArea");
  var pukuReactWrap = document.getElementById("pukuReactWrap");
  var pukuDanceWrap = document.getElementById("pukuDanceWrap");
  var musicBtn = document.getElementById("musicBtn");
  var bubble = document.getElementById("speechBubble");

  var audioCtx = null;
  var playing = false;
  var musicTimer = null;
  var stepIndex = 0;
  var autoSpeechTimer = null;
  var hideBubbleTimer = null;

  function randChoice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function ensureAudio() {
    if (!audioCtx) {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) { audioCtx = new Ctx(); }
    }
    return audioCtx;
  }

  function playNote(freq, durationSec, volume) {
    var ctx = ensureAudio();
    if (!ctx) { return; }
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "triangle";
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);
    var now = ctx.currentTime;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(volume, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);
    osc.start(now);
    osc.stop(now + durationSec);
  }

  function musicStep() {
    var note = MELODY[stepIndex % MELODY.length];
    playNote(note, (STEP_MS / 1000) * 0.9, 0.22);
    if (stepIndex % 4 === 0) {
      playNote(note / 2, (STEP_MS / 1000) * 0.9, 0.15);
    }
    stepIndex++;
  }

  function showSpeech(text) {
    clearTimeout(hideBubbleTimer);
    bubble.textContent = text;
    bubble.classList.add("show");
    hideBubbleTimer = setTimeout(function () {
      bubble.classList.remove("show");
    }, 1400);
  }

  function scheduleAutoSpeech() {
    autoSpeechTimer = setTimeout(function () {
      if (playing) {
        showSpeech(randChoice(PHRASES));
        scheduleAutoSpeech();
      }
    }, 4000 + Math.random() * 4000);
  }

  function startMusic() {
    var ctx = ensureAudio();
    if (!ctx) { return; }
    if (ctx.state === "suspended") { ctx.resume(); }
    if (playing) { return; }
    playing = true;
    stepIndex = 0;
    musicBtn.textContent = "🎵 とめる ⏸";
    musicBtn.classList.add("playing");
    app.classList.add("music-on");
    pukuDanceWrap.classList.add("dancing");
    musicStep();
    musicTimer = setInterval(musicStep, STEP_MS);
    scheduleAutoSpeech();
    showSpeech(randChoice(PHRASES));
  }

  function stopMusic() {
    playing = false;
    clearInterval(musicTimer);
    musicTimer = null;
    clearTimeout(autoSpeechTimer);
    musicBtn.textContent = "🎵 おんがく ▶";
    musicBtn.classList.remove("playing");
    app.classList.remove("music-on");
    pukuDanceWrap.classList.remove("dancing");
  }

  function spawnEffect(clientX, clientY) {
    var rect = characterArea.getBoundingClientRect();
    var x = clientX - rect.left;
    var y = clientY - rect.top;
    var el = document.createElement("div");
    el.className = "effect";
    el.textContent = randChoice(EFFECT_EMOJI);
    el.style.left = x + "px";
    el.style.top = y + "px";
    characterArea.appendChild(el);
    el.addEventListener("animationend", function () {
      el.remove();
    });
  }

  function triggerReaction() {
    var type = Math.random() < 0.5 ? "react-jump" : "react-spin";
    pukuReactWrap.classList.remove("react-jump", "react-spin");
    void pukuReactWrap.offsetWidth;
    pukuReactWrap.classList.add(type);
    if (Math.random() < 0.6) {
      showSpeech(randChoice(PHRASES));
    }
  }

  pukuReactWrap.addEventListener("animationend", function (e) {
    if (e.animationName === "reactJump" || e.animationName === "reactSpin") {
      pukuReactWrap.classList.remove("react-jump", "react-spin");
    }
  });

  characterArea.addEventListener("pointerdown", function (e) {
    spawnEffect(e.clientX, e.clientY);
    triggerReaction();
  });

  musicBtn.addEventListener("click", function () {
    if (playing) {
      stopMusic();
    } else {
      startMusic();
    }
  });
})();
</script>
</body>
</html>
