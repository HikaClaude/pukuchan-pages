<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ぷくちゃんと おえかき</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Rounded Mplus 1c", sans-serif;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: linear-gradient(135deg, #fff6b7, #d5ffd5, #c9f0ff);
  }

  #title {
    flex: 0 0 auto;
    text-align: center;
    font-size: clamp(18px, 5.4vw, 28px);
    font-weight: 900;
    color: #5a5a2a;
    padding: 1.6vh 0 0.4vh 0;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }

  #canvasArea {
    position: relative;
    flex: 1;
    touch-action: none;
  }

  #drawCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: inset 0 0 0 4px rgba(0,0,0,0.05);
  }

  #pukuCorner {
    position: absolute;
    right: 3vw;
    bottom: 2vh;
    width: min(30vw, 26vh);
    aspect-ratio: 300 / 320;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.15));
  }
  #pukuSvg { width: 100%; height: 100%; display: block; }

  #pukuCorner.idle { animation: idleBob 2.2s ease-in-out infinite; }
  @keyframes idleBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3%); }
  }
  #pukuCorner.react-jump { animation: reactJump 0.6s ease; }
  @keyframes reactJump {
    0%   { transform: translateY(0) scale(1, 1); }
    30%  { transform: translateY(0) scale(1.15, 0.8); }
    55%  { transform: translateY(-32%) scale(0.85, 1.15); }
    80%  { transform: translateY(0) scale(1.1, 0.85); }
    100% { transform: translateY(0) scale(1, 1); }
  }

  .bubble {
    position: absolute;
    top: 2vh;
    left: 50%;
    transform: translate(-50%, 10px) scale(0.85);
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    background: #ffffff;
    border-radius: 24px;
    padding: 1.4vh 5vw;
    font-size: clamp(16px, 4.6vw, 26px);
    font-weight: 800;
    color: #555;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
    max-width: 82%;
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 13px 11px 0 11px;
    border-style: solid;
    border-color: #ffffff transparent transparent transparent;
  }
  .bubble.show {
    opacity: 1;
    transform: translate(-50%, 0) scale(1);
  }

  #controls {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 2.4vw;
    padding: 1.6vh 4vw calc(1.6vh + env(safe-area-inset-bottom)) 4vw;
  }

  .swatch {
    width: 13vw;
    height: 13vw;
    max-width: 62px;
    max-height: 62px;
    border-radius: 50%;
    border: 4px solid #fff;
    box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    flex: 0 0 auto;
    touch-action: manipulation;
  }
  .swatch.selected {
    border-color: #444;
    transform: scale(1.15);
  }

  #swatchRow {
    display: flex;
    gap: 2.2vw;
    flex: 1 1 auto;
    overflow-x: auto;
    align-items: center;
  }

  .toolBtn {
    flex: 0 0 auto;
    width: 15vw;
    height: 15vw;
    max-width: 74px;
    max-height: 74px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(160deg, #ffffff, #e6e6e6);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    font-size: 6vw;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: manipulation;
  }
  .toolBtn:active {
    transform: translateY(2px);
  }
  .toolBtn.eraser.selected {
    background: linear-gradient(160deg, #ffe08a, #ffc94d);
  }
</style>
</head>
<body>

  <div id="app">
    <div id="title">🖍 ぷくちゃんと おえかき</div>

    <div id="canvasArea">
      <canvas id="drawCanvas"></canvas>
      <div id="pukuCorner" class="idle">
        <svg id="pukuSvg" viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="212" cy="255" rx="24" ry="15" transform="rotate(30 212 255)" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="4"/>
          <polygon points="228,238 244,232 236,250" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>

          <ellipse cx="116" cy="298" rx="28" ry="18" fill="#5FCB93" stroke="#3C8F6C" stroke-width="4"/>
          <ellipse cx="184" cy="298" rx="28" ry="18" fill="#5FCB93" stroke="#3C8F6C" stroke-width="4"/>

          <polygon points="196,205 210,190 214,212" fill="#5FCB93" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>
          <polygon points="205,230 220,218 221,238" fill="#5FCB93" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>

          <ellipse cx="150" cy="220" rx="76" ry="68" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="5"/>
          <ellipse cx="150" cy="240" rx="44" ry="36" fill="#FFF6DA"/>

          <ellipse id="armLeft" cx="78" cy="215" rx="20" ry="30" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="4"/>
          <ellipse id="armRight" cx="222" cy="215" rx="20" ry="30" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="4"/>

          <g id="pukuHead">
            <circle cx="150" cy="105" r="70" fill="#7FE3B3" stroke="#3C8F6C" stroke-width="5"/>

            <polygon points="132,46 148,26 152,50" fill="#5FCB93" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>
            <polygon points="150,44 165,25 170,50" fill="#5FCB93" stroke="#3C8F6C" stroke-width="3" stroke-linejoin="round"/>

            <ellipse cx="106" cy="132" rx="13" ry="8" fill="#FF9EB5" opacity="0.6"/>
            <ellipse cx="194" cy="132" rx="13" ry="8" fill="#FF9EB5" opacity="0.6"/>

            <ellipse cx="126" cy="108" rx="19" ry="23" fill="#FFFFFF" stroke="#3C8F6C" stroke-width="2.5"/>
            <ellipse cx="174" cy="108" rx="19" ry="23" fill="#FFFFFF" stroke="#3C8F6C" stroke-width="2.5"/>
            <circle cx="130" cy="113" r="9" fill="#2B2B3A"/>
            <circle cx="170" cy="113" r="9" fill="#2B2B3A"/>
            <circle cx="135" cy="104" r="3.5" fill="#FFFFFF"/>
            <circle cx="175" cy="104" r="3.5" fill="#FFFFFF"/>

            <path d="M136,142 Q150,154 164,142" stroke="#2B2B3A" stroke-width="4" fill="none" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <div id="speechBubble" class="bubble"></div>
    </div>

    <div id="controls">
      <div id="swatchRow"></div>
      <button id="eraserBtn" class="toolBtn eraser" type="button" title="けしゴム">🧹</button>
      <button id="clearBtn" class="toolBtn" type="button" title="クリア">🗑️</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var COLORS = ["#2b2b3a", "#ff5b7f", "#ff9f45", "#ffd93d", "#5fcb93", "#4fb4ef", "#7c6cff", "#ffffff"];
  var PRAISE_PHRASES = ["すごい！", "じょうず〜！", "きれい！", "たのしいね！"];

  var canvas = document.getElementById("drawCanvas");
  var ctx = canvas.getContext("2d");
  var canvasArea = document.getElementById("canvasArea");
  var pukuCorner = document.getElementById("pukuCorner");
  var bubble = document.getElementById("speechBubble");
  var swatchRow = document.getElementById("swatchRow");
  var eraserBtn = document.getElementById("eraserBtn");
  var clearBtn = document.getElementById("clearBtn");

  var currentColor = COLORS[0];
  var erasing = false;
  var drawing = false;
  var lastX = 0, lastY = 0;
  var strokeCount = 0;
  var hideBubbleTimer = null;
  var praiseTimer = null;

  function resizeCanvas() {
    var rect = canvas.getBoundingClientRect();
    var prev = document.createElement("canvas");
    prev.width = canvas.width;
    prev.height = canvas.height;
    prev.getContext("2d").drawImage(canvas, 0, 0);
    var dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    if (prev.width > 0) {
      ctx.drawImage(prev, 0, 0, prev.width, prev.height, 0, 0, rect.width, rect.height);
    }
  }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  function randChoice(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function showSpeech(text) {
    clearTimeout(hideBubbleTimer);
    bubble.textContent = text;
    bubble.classList.add("show");
    hideBubbleTimer = setTimeout(function () {
      bubble.classList.remove("show");
    }, 1400);
  }

  function reactJump() {
    pukuCorner.classList.remove("react-jump");
    void pukuCorner.offsetWidth;
    pukuCorner.classList.add("react-jump");
  }
  pukuCorner.addEventListener("animationend", function (e) {
    if (e.animationName === "reactJump") {
      pukuCorner.classList.remove("react-jump");
    }
  });

  COLORS.forEach(function (color, i) {
    var sw = document.createElement("button");
    sw.className = "swatch" + (i === 0 ? " selected" : "");
    sw.style.background = color;
    sw.type = "button";
    sw.addEventListener("click", function () {
      currentColor = color;
      erasing = false;
      eraserBtn.classList.remove("selected");
      Array.prototype.forEach.call(swatchRow.children, function (c) { c.classList.remove("selected"); });
      sw.classList.add("selected");
    });
    swatchRow.appendChild(sw);
  });

  eraserBtn.addEventListener("click", function () {
    erasing = true;
    eraserBtn.classList.add("selected");
    Array.prototype.forEach.call(swatchRow.children, function (c) { c.classList.remove("selected"); });
  });

  clearBtn.addEventListener("click", function () {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function schedulePraise() {
    clearTimeout(praiseTimer);
    praiseTimer = setTimeout(function () {
      showSpeech(randChoice(PRAISE_PHRASES));
      reactJump();
    }, 900);
  }

  canvasArea.addEventListener("pointerdown", function (e) {
    if (e.target === eraserBtn || e.target === clearBtn || e.target.classList.contains("swatch")) { return; }
    drawing = true;
    var p = getPos(e);
    lastX = p.x;
    lastY = p.y;
    ctx.beginPath();
    ctx.arc(p.x, p.y, (erasing ? 22 : 7) / 2, 0, Math.PI * 2);
    ctx.fillStyle = erasing ? "#ffffff" : currentColor;
    ctx.fill();
    canvasArea.setPointerCapture(e.pointerId);
    strokeCount++;
  });

  canvasArea.addEventListener("pointermove", function (e) {
    if (!drawing) { return; }
    var p = getPos(e);
    ctx.strokeStyle = erasing ? "#ffffff" : currentColor;
    ctx.lineWidth = erasing ? 26 : 10;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    lastX = p.x;
    lastY = p.y;
  });

  function endDraw() {
    if (!drawing) { return; }
    drawing = false;
    if (!erasing) { schedulePraise(); }
  }
  canvasArea.addEventListener("pointerup", endDraw);
  canvasArea.addEventListener("pointercancel", endDraw);
})();
</script>
</body>
</html>
